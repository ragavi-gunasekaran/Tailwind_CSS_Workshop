<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Karlskrona Tourism - Contact</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 text-slate-900">

<header class="bg-white/80 backdrop-blur-md sticky top-0 z-50 shadow-sm">
  <nav class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
    <a href="home.html" class="text-2xl font-bold text-blue-900">Karlskrona</a>
    <div class="hidden md:flex gap-8 font-medium text-slate-700">
      <a href="home.html" class="hover:text-blue-700">Home</a>
      <a href="places.html" class="hover:text-blue-700">Places</a>
      <a href="activities.html" class="hover:text-blue-700">Activities</a>
      <a href="packages.html" class="hover:text-blue-700">Packages</a>
      <a href="news.html" class="hover:text-blue-700">News</a>
      <a href="contact.html" class="hover:text-blue-700">Contact</a>
    </div>
    <a href="contact.html" class="bg-yellow-400 text-blue-950 px-4 py-2 rounded-full font-semibold hover:bg-yellow-300">Plan Visit</a>
  </nav>
</header>


<section class="bg-sky-100 py-20">
  <div class="max-w-4xl mx-auto px-6 text-center">
    <h1 class="text-3xl md:text-5xl font-bold text-blue-950 mb-4">Ready to Visit Karlskrona?</h1>
    <p class="text-slate-600 mb-8">
      Plan a peaceful coastal trip filled with islands, history, fika, and Swedish views.
    </p>

    <form class="bg-white p-6 rounded-2xl shadow-md grid grid-cols-1 md:grid-cols-3 gap-4">
      <input type="text" placeholder="Your Name" class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <input type="email" placeholder="Your Email" class="border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
      <button class="bg-blue-700 text-white rounded-xl font-bold hover:bg-blue-800 py-3">Send</button>
    </form>
  </div>
</section>


<footer class="bg-blue-950 text-white py-8 mt-20">
  <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row justify-between gap-4 text-center md:text-left">
    <p class="text-slate-300">Karlskrona Tourism</p>
    <p class="text-slate-300">© 2026</p>
  </div>
</footer>

</body>
</html>
